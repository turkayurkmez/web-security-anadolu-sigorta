<html>
    <head>       
        <title>My First Web Page</title>
        <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script> 
    </head>
    <body>
        <iframe src="https://www.sozcu.com.tr" width="100%" height="600px"></iframe>
        <iframe src="https://www.hepsiburada.com.tr" width="100%" height="600px"></iframe>
        <button id="myButton">Post'ları getir</button>

        <div id="postContainer"></div>
        <script>
            $(document).ready(function() {
                $('#myButton').click(function() {
                    $.ajax({
                        url: 'https://localhost:7277/api/posts',
                        method: 'GET',
                        success: function(data) {
                            var postContainer = $('#postContainer');
                            postContainer.empty(); // Clear previous posts
                            data.forEach(function(post) {
                                var postElement = $('<div></div>').text(post.title);
                                postContainer.append(postElement);
                            });
                        },
                        error: function() {
                            alert('Error fetching posts.');
                        }
                    });
                });
            });
        </script>
    </body>    
</html>
